services:
  app:
    build: .                    # This tells Docker to build from local Dockerfile
    image: swift-api:1.1.0
    container_name: swiftdeploy-app
    restart: unless-stopped
    user: "1001:1001"
    cap_drop:
      - ALL
    environment:
      - MODE=stable
      - APP_VERSION=1.1.0
    networks:
      - swiftdeploy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: swiftdeploy-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - swiftdeploy-net

  opa:
    image: openpolicyagent/opa:latest
    container_name: swiftdeploy-opa
    restart: unless-stopped
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro
    command: ["run", "--server", "/policies"]
    networks:
      - swiftdeploy-net

networks:
  swiftdeploy-net:
    driver: bridge
services:
  app:
    image: swift-api:1.0.0
    container_name: swiftdeploy-app
    restart: unless-stopped
    user: "1001:1001"
    cap_drop:
      - ALL
    environment:
      - MODE=stable
      - APP_VERSION=1.0.0
      - APP_PORT=3000
    networks:
      - swiftdeploy-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:alpine
    container_name: swiftdeploy-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - swiftdeploy-net

networks:
  swiftdeploy-net:
    driver: bridge

volumes:
  nginx_logs:
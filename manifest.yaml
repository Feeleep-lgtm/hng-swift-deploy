# =============================================
# SwiftDeploy with OPA & Metrics
# =============================================

app:
  name: swift-api
  version: "1.1.0"
  port: 3000
  mode: stable

nginx:
  image: nginx:alpine
  port: 8080

opa:
  image: openpolicyagent/opa:latest     # Correct tag
  port: 8181

network:
  name: swiftdeploy-net
  driver: bridge
